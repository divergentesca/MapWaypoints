<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test iframe mapa</title>
</head>
<body style="margin:0;background:#111;">
  <iframe
    id="test"
    src="http://127.0.0.1:5173/?popups=1&overlays=1"
    style="width:100%;height:400px;border:2px solid red;"
  ></iframe>
  <script>
    window.addEventListener('message', function(e) {
      console.log('📨 postMessage recibido:', e.data);
      if (e.data?.type === 'mapa-resize') {
        document.getElementById('test').style.height = e.data.height + 'px';
        console.log('✅ Altura ajustada a:', e.data.height + 'px');
      }
    });
  </script>
</body>
</html>
